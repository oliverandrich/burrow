name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ matrix.go-version }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ matrix.go-version }}-

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-1.26-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-1.26-

      - uses: golangci/golangci-lint-action@v9

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check THIRD_PARTY_LICENSES.md is up to date
        run: |
          ./scripts/generate-licenses.sh
          if ! git diff --quiet THIRD_PARTY_LICENSES.md; then
            echo "::error::THIRD_PARTY_LICENSES.md is out of date. Run 'just licenses' and commit the result."
            git diff THIRD_PARTY_LICENSES.md
            exit 1
          fi
