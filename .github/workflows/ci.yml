name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-${{ matrix.go-version }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-${{ matrix.go-version }}-

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ${{ matrix.go-version == '1.26' && '-race' || '' }} ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: go-build-1.26-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: go-build-1.26-

      - uses: golangci/golangci-lint-action@v9

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
