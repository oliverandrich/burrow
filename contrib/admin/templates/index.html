{{ define "admin/index" -}}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">{{ t "admin-dashboard-title" }}</h2>
</div>
{{ if .SidebarGroups -}}
    {{- range .SidebarGroups }}
    <h5 class="text-body-secondary mb-3">{{ .Label }}</h5>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3 mb-4">
        {{- range .Items }}
        <div class="col">
            <a href="{{ .URL }}" class="card text-decoration-none h-100 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    {{- if .Icon }}
                    <span class="fs-4 me-3 text-primary">{{ .Icon }}</span>
                    {{- end }}
                    <span class="fw-semibold text-body">{{ .Label }}</span>
                </div>
            </a>
        </div>
        {{- end }}
    </div>
    {{- end }}
{{- else }}
    <p class="text-body-secondary">{{ t "admin-dashboard-empty" }}</p>
{{- end }}
{{- end }}
