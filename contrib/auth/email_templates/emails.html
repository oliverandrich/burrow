{{ define "authmail/verification" -}}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
    </head>
    <body style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
        <h1 style="color: #333;">{{ .Heading }}</h1>
        <p>{{ .Body }}</p>
        <p style="text-align: center; margin: 30px 0;">
            <a
                href="{{ .URL }}"
                style="background-color: #0066cc; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block;"
            >
                {{ .Button }}
            </a>
        </p>
        <p style="color: #666; font-size: 14px;">
            {{ .Fallback }}
            <br/>
            <a href="{{ .URL }}">{{ .URL }}</a>
        </p>
    </body>
</html>
{{- end }}
